server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: JwtAuthFilter
              args:
                excludedPaths: /api/v1/auth/register,/api/v1/auth/login,/api/v1/auth/refresh

        - id: account-service
          uri: http://account-service:8082
          predicates:
            - Path=/api/v1/accounts/**
          filters:
            - JwtAuthFilter

        - id: transaction-service
          uri: http://transaction-service:8083
          predicates:
            - Path=/api/v1/transactions/**
          filters:
            - JwtAuthFilter

jwt:
  secret: "fintrack-super-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm"

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.fintrack: DEBUG
    org.springframework.cloud.gateway: DEBUG